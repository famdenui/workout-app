<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="トレーニング">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f2f2f7">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%235e5ce6'/><text y='68' x='50' text-anchor='middle' font-size='58' font-family='system-ui'>💪</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>トレーニング</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap');
:root{
  --bg:#f2f2f7;--surface:#fff;--surface2:#f2f2f7;--border:#e5e5ea;--border2:#d1d1d6;
  --text:#1c1c1e;--text2:#636366;--text3:#8e8e93;--text4:#aeaeb2;--text5:#c7c7cc;
  --accent:#5e5ce6;--accent-bg:#eef0ff;--accent-light:rgba(94,92,230,0.12);
  --blue:#007aff;--green:#34c759;--red:#ff3b30;--orange:#ff9500;
  --gym1:#5e5ce6;--gym2:#007aff;--gym3:#34c759;
  --radius:13px;--radius-sm:10px;--radius-xs:7px;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;overscroll-behavior:none;overflow-x:hidden;width:100%}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;height:100dvh;overflow:hidden;position:relative;overflow-x:hidden}






/* INSTALL BANNER */
.install-banner{position:fixed;bottom:0;left:0;right:0;background:#1c1c1e;color:#fff;padding:12px 16px max(16px,env(safe-area-inset-bottom));z-index:400;display:flex;align-items:center;gap:10px;font-family:var(--font);max-width:430px;margin:0 auto}
.install-banner-text{flex:1;font-size:12px;line-height:1.5;color:rgba(255,255,255,0.85)}
.install-banner-text strong{color:#fff;display:block;margin-bottom:2px;font-size:13px}
.install-banner-close{font-size:18px;color:rgba(255,255,255,0.5);cursor:pointer;padding:4px;touch-action:manipulation;flex-shrink:0}

/* SETTINGS */
.settings-section{margin-bottom:24px}
.settings-section-title{font-size:11px;color:var(--text3);letter-spacing:0.07em;margin-bottom:8px;padding:0 4px}
.settings-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.settings-item-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.settings-item-body{flex:1;min-width:0}
.settings-item-name{font-size:14px;font-weight:500;color:var(--text)}
.settings-item-sub{font-size:11px;color:var(--text4);margin-top:2px}
.settings-item-del{width:30px;height:30px;border:none;background:none;color:var(--text5);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;touch-action:manipulation;flex-shrink:0}
.settings-item-del:active{color:var(--red)}
.settings-add-row{display:flex;gap:8px;margin-top:4px}
.settings-add-input{flex:1;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;font-size:16px;color:var(--text);font-family:var(--font);outline:none}
.settings-add-input:focus{border-color:var(--accent)}
.settings-add-btn{padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);touch-action:manipulation;white-space:nowrap}
.color-picker-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s;touch-action:manipulation;flex-shrink:0}
.color-opt.on{border-color:var(--text);transform:scale(1.15)}

/* DELETE */
.hist-del{font-size:11px;color:var(--red);padding:4px 8px;border:0.5px solid rgba(255,59,48,0.3);border-radius:99px;background:none;cursor:pointer;font-family:var(--font);margin-top:8px;display:block;width:100%;touch-action:manipulation}
.hist-del:active{background:rgba(255,59,48,0.08)}
.delete-confirm{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:260;display:none;align-items:flex-end;justify-content:center;padding-bottom:env(safe-area-inset-bottom)}
.delete-confirm.on{display:flex}
.delete-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px max(20px,env(safe-area-inset-bottom));width:100%;max-width:430px}
.delete-sheet h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.delete-sheet p{font-size:13px;color:var(--text3);margin-bottom:18px;line-height:1.6}
.delete-btn-red{width:100%;padding:13px;border-radius:var(--radius);border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);background:var(--red);color:#fff;margin-bottom:8px;touch-action:manipulation}
.delete-btn-cancel{width:100%;padding:13px;border-radius:var(--radius);border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);background:var(--bg);color:var(--text3);touch-action:manipulation}

.set-del-btn{width:24px;height:24px;border:none;background:none;color:var(--text5);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;transition:all 0.15s}
.set-del-btn:active{background:rgba(255,59,48,0.08);border-color:var(--red);color:var(--red)}
/* NUM INPUT */
.num-ctrl{display:flex;align-items:center;background:var(--bg);border-radius:var(--radius-xs);padding:2px 3px;gap:1px}
.num-ctrl-btn{width:28px;height:30px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0;line-height:1;touch-action:manipulation;-webkit-user-select:none;font-weight:300}
.num-ctrl-btn:active{background:var(--border2)}
.num-direct{font-size:15px;font-weight:500;color:var(--text);font-family:var(--mono);text-align:center;min-width:52px;background:none;border:none;outline:none;cursor:pointer;padding:4px 2px;border-radius:6px;touch-action:manipulation}
.num-direct:focus{background:var(--surface);box-shadow:0 0 0 1.5px var(--accent);}

/* DATE PICKER */
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.date-toggle{font-size:12px;color:var(--accent);font-weight:500;cursor:pointer;padding:2px 0;border:none;background:none;font-family:var(--font)}
.date-input{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-xs);padding:6px 10px;font-size:15px;color:var(--text);font-family:var(--font);outline:none;cursor:pointer;flex:1}
.date-input:focus{border-color:var(--accent)}
.date-label{font-size:12px;color:var(--text3);margin-right:4px}

/* NAV */
.nav{display:flex;background:var(--surface);border-top:0.5px solid var(--border2);padding:6px 0 max(10px,env(safe-area-inset-bottom));flex-shrink:0;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:none;background:none;color:var(--text5);cursor:pointer;font-family:var(--font);transition:color 0.15s}
.nav-btn .nav-ico{width:22px;height:22px}
.nav-btn span{font-size:10px}
.nav-btn.on{color:var(--accent)}

/* SCREENS */
.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;display:none;padding:16px 16px 24px;-webkit-overflow-scrolling:touch}
.screen.on{display:block}

/* HEADER */
.page-title{font-size:22px;font-weight:600;letter-spacing:-0.5px;color:var(--text);margin-bottom:2px}
.page-sub{font-size:12px;color:var(--text3);margin-bottom:14px}

/* GYM CHIPS */
.gym-chips{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.gym-chip{padding:6px 13px;border-radius:99px;border:0.5px solid var(--border2);background:var(--surface);color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:var(--font)}
.gym-chip.on{background:var(--gym-color,var(--accent));border-color:var(--gym-color,var(--accent));color:#fff;font-weight:600}

/* INPUT */
.add-input-wrap{position:relative;margin-bottom:6px}
.add-input{width:100%;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 44px 10px 14px;font-size:16px;color:var(--text);font-family:var(--font);outline:none;transition:border-color 0.15s}
.add-input:focus{border-color:var(--accent)}
.add-input::placeholder{color:var(--text5)}
.add-input-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text4);pointer-events:none;display:inline-flex}

/* SUGGEST */
.suggest-sheet{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;display:none}
.suggest-sheet.on{display:block}
.suggest-header{font-size:10px;color:var(--text3);letter-spacing:0.06em;padding:8px 12px 4px}
.suggest-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-top:0.5px solid var(--bg);cursor:pointer;transition:background 0.1s;-webkit-user-select:none}
.suggest-item:hover{background:var(--bg)}
.suggest-ico{width:26px;height:26px;border-radius:7px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.suggest-ico svg{width:15px;height:15px}
.suggest-info{flex:1;min-width:0}
.suggest-name{font-size:13px;font-weight:500;color:var(--text)}
.suggest-prev{font-size:10px;color:var(--text4);font-family:var(--mono);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.suggest-add{font-size:20px;color:var(--accent);flex-shrink:0;line-height:1}
.suggest-divider{height:0.5px;background:var(--border);margin:0 12px}
.suggest-new{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;color:var(--text3)}
.suggest-new i{font-size:15px}
.suggest-new span{font-size:12px}

/* EXERCISE CARD */
.ex-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:11px 12px 8px;margin-bottom:8px;transition:border-color 0.2s}
.ex-card.active{border-color:rgba(94,92,230,0.3);background:#fafaff}
.ex-head{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.ex-ico{width:28px;height:28px;border-radius:8px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ex-ico svg{width:16px;height:16px}
.ex-meta{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:500;color:var(--text)}
.ex-prev{font-size:10px;color:var(--text4);font-family:var(--mono);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-del{width:28px;height:28px;border:none;background:none;color:var(--text5);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0}
.ex-del:hover{background:var(--bg);color:var(--text3)}

/* SET ROW */
.set-row{display:flex;align-items:center;gap:4px;margin-bottom:5px}

.set-num{display:none}
.num-ctrl{display:flex;align-items:center;background:var(--bg);border-radius:var(--radius-xs);padding:4px 4px;gap:2px}
.num-ctrl-btn{width:36px;height:36px;border:none;background:none;color:var(--text4);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;line-height:1;touch-action:manipulation;-webkit-user-select:none}
.num-ctrl-btn:active{background:var(--border2)}
.num-val{font-size:12px;font-weight:500;color:var(--text);min-width:36px;text-align:center;font-family:var(--mono)}
.done-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface);color:var(--text5);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;transition:all 0.15s;margin-left:auto}
.done-btn.on{background:var(--green);border-color:var(--green);color:#fff}
.preset-tag{display:none}
.add-set-btn{display:flex;align-items:center;gap:5px;padding:5px 2px;margin-top:2px;cursor:pointer;color:var(--text4);border:none;background:none;font-family:var(--font)}
.add-set-btn span:first-child{width:13px;height:13px}
.add-set-btn span{font-size:11px}

/* ADD EXERCISE */
.add-ex-row{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--surface);border:0.5px dashed var(--border2);border-radius:var(--radius);margin-bottom:6px;cursor:pointer}
.add-ex-ico{width:26px;height:26px;border-radius:7px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-ex-row span{font-size:13px;color:var(--text3)}

/* SAVE */
.save-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);letter-spacing:-0.2px;margin-top:4px;transition:opacity 0.15s}
.save-btn:active{opacity:0.85}
.save-btn:disabled{opacity:0.35;cursor:not-allowed}

/* TIMER FULLSCREEN */
.timer-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;padding:env(safe-area-inset-top,16px) 20px max(20px,env(safe-area-inset-bottom));font-family:var(--font);max-width:430px;margin:0 auto}
.timer-screen.on{display:flex}
.timer-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:0;padding-top:8px}
.timer-ctx{font-size:12px;color:var(--text3)}
.timer-skip{font-size:13px;color:var(--accent);font-weight:500;cursor:pointer;padding:4px 0}
.timer-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.timer-label{font-size:12px;color:var(--text3);letter-spacing:0.14em;margin-bottom:16px}
.ring-container{position:relative;width:260px;height:260px;margin-bottom:20px}
.ring-container svg{position:absolute;inset:0;width:100%;height:100%}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-time{font-size:68px;font-weight:200;color:var(--text);letter-spacing:-4px;font-family:var(--mono);line-height:1}
.ring-sub{font-size:13px;color:var(--text4);letter-spacing:0.05em;margin-top:8px}
.ring-time.urgent{color:var(--red)}
.ring-time.done{color:var(--green)}
.timer-next-wrap{text-align:center}
.timer-next-lbl{font-size:11px;color:var(--text3);margin-bottom:5px}
.timer-next-ex{font-size:17px;font-weight:500;color:var(--text)}
.timer-next-set{font-size:15px;color:var(--accent);margin-top:4px;font-family:var(--mono)}
.timer-bottom{display:flex;flex-direction:column;gap:10px}
.seg-group{width:100%}
.segs{display:flex;gap:4px}
.seg{flex:1;height:4px;border-radius:99px;background:var(--border)}
.seg.f{background:linear-gradient(to right,var(--blue),var(--accent))}
.seg.p{background:linear-gradient(to right,var(--blue),var(--accent));opacity:0.3}
.seg-info{display:flex;justify-content:space-between;margin-top:5px}
.seg-lbl{font-size:10px;color:var(--text4)}
.adj-row{display:flex;gap:8px;justify-content:center}
.adj-btn{font-size:14px;padding:11px 20px;border-radius:99px;color:var(--text2);background:var(--surface);border:0.5px solid var(--border);cursor:pointer;font-family:var(--font);font-weight:500;transition:all 0.15s;touch-action:manipulation}
.adj-btn:active{background:var(--bg)}
.adj-btn.reset{color:var(--text4)}

/* DASHBOARD */
.top-stats{display:flex;gap:6px;margin-bottom:12px}
.stat-card{flex:1;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 10px}
.stat-val{font-size:20px;font-weight:500;color:var(--text);letter-spacing:-0.5px;font-family:var(--mono);line-height:1}
.stat-unit{font-size:10px;color:var(--text4)}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:4px}
.stat-trend{font-size:10px;font-weight:500;margin-top:3px}
.stat-trend.up{color:var(--green)}
.stat-trend.flat{color:var(--text4)}
.stat-trend.dn{color:var(--red)}

/* AI ADVICE */
.ai-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 13px;margin-bottom:12px;position:relative;overflow:hidden}
.ai-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--accent),var(--blue))}
.ai-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ai-icon-wrap{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--blue));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-icon-wrap i{font-size:13px;color:#fff}
.ai-lbl{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:0.03em}
.ai-updated{font-size:10px;color:var(--text4);margin-left:auto}
.ai-items{display:flex;flex-direction:column;gap:8px}
.ai-item{display:flex;gap:9px;align-items:flex-start}
.ai-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ai-text{font-size:12px;color:var(--text);line-height:1.6}
.ai-text strong{font-weight:600}
.ai-tag{display:inline-block;font-size:9px;padding:1px 7px;border-radius:99px;margin-left:5px;vertical-align:middle}
.tag-warn{background:#fff3e0;color:#e65100}
.tag-ok{background:#f0fff4;color:#1a7d36}
.tag-miss{background:#fce4ec;color:#b71c1c}
.ai-loading{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:12px;padding:4px 0}
.ai-loading .spin-ico{width:16px;height:16px;animation:spin 1s linear infinite;display:inline-flex}
@keyframes spin{to{transform:rotate(360deg)}}

/* FILTER */
.filter-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.filter-chip{font-size:11px;padding:4px 11px;border-radius:99px;border:0.5px solid var(--border2);background:var(--surface);color:var(--text3);cursor:pointer;font-family:var(--font);transition:all 0.15s}
.filter-chip.on{background:var(--text);border-color:var(--text);color:#fff}

/* EXERCISE PROGRESS */
.epc{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:11px 12px;margin-bottom:7px}
.epc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.epc-left{display:flex;align-items:center;gap:8px}
.epc-right{text-align:right}
.epc-name{font-size:13px;font-weight:500;color:var(--text)}
.epc-gym{font-size:10px;color:var(--text4);margin-top:2px;display:flex;align-items:center;gap:4px}
.gdot{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0}
.epc-val{font-size:15px;font-weight:500;color:var(--text);font-family:var(--mono);letter-spacing:-0.3px}
.epc-unit{font-size:10px;color:var(--text4)}
.epc-delta{font-size:10px;font-weight:500;margin-top:2px}
.epc-delta.up{color:var(--green)}
.epc-delta.flat{color:var(--text4)}
.epc-delta.dn{color:var(--red)}
.epc-chart{height:40px;position:relative}
.epc-chart svg{width:100%;height:100%}

/* SECTION DIVIDER */
.sec-div{display:flex;align-items:center;gap:8px;margin:4px 0 10px}
.sec-line{flex:1;height:0.5px;background:var(--border)}
.sec-lbl{font-size:10px;color:var(--text4);letter-spacing:0.07em;white-space:nowrap}

/* HISTORY */
.hist-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:11px 12px;margin-bottom:7px;cursor:pointer;transition:border-color 0.15s}
.hist-item:hover{border-color:var(--border2)}
.hist-meta{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.hist-date{font-size:13px;font-weight:500;color:var(--text)}
.hist-day{font-size:10px;color:var(--text3);margin-top:2px}
.hist-gym{font-size:10px;padding:3px 10px;border-radius:99px;background:var(--bg);color:var(--text2);display:flex;align-items:center;gap:4px}
.hist-tags{display:flex;flex-wrap:wrap;gap:4px}
.hist-tag{font-size:10px;color:var(--text2);background:var(--bg);padding:3px 8px;border-radius:5px}
.hist-more{font-size:10px;color:var(--text5);padding:3px 4px}
.hist-detail{margin-top:9px;padding-top:9px;border-top:0.5px solid var(--bg);display:none}
.hist-detail.on{display:block}
.hist-dr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.hist-dn{font-size:11px;color:var(--text3)}
.hist-ds{display:flex;gap:4px;flex-wrap:wrap}
.hist-dset{font-size:10px;color:var(--text2);background:var(--bg);padding:2px 7px;border-radius:4px;font-family:var(--mono)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text4)}
.empty i{font-size:48px;margin-bottom:14px;display:block;color:var(--text5)}
.empty p{font-size:13px;line-height:1.7}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;transition:all 0.25s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* CONFIRM MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:250;display:none;align-items:flex-end;justify-content:center;padding-bottom:env(safe-area-inset-bottom)}
.modal-overlay.on{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px max(20px,env(safe-area-inset-bottom));width:100%;max-width:430px}
.modal-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--text3);margin-bottom:18px;line-height:1.6}
.modal-btns{display:flex;flex-direction:column;gap:8px}
.modal-btn{width:100%;padding:13px;border-radius:var(--radius);border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font)}
.modal-btn.primary{background:var(--accent);color:#fff}
.modal-btn.secondary{background:var(--bg);color:var(--text3)}
</style>

        <circle cx="100" cy="100" r="88" fill="none" stroke="#e5e5ea" stroke-width="7"/>

      <div class="ring-inner">

      </div>
    </div>
    <div class="timer-next-wrap">
      <div class="timer-next-lbl">次のセット</div>

      <div class="adj-btn" onclick="adjustDur(15)">+15秒</div>
      <div class="adj-btn reset" onclick="resetTimer()">↺ リセット</div>
    </div>
  </div>
</div>

<!-- SCREENS -->

      </div>
    </div>
  </div>

  <!-- 記録 -->

const customExerciseCategories = {};

async function detectExerciseCategory(name){
  if(customExerciseCategories[name]) return customExerciseCategories[name];
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:50,
        messages:[{role:'user',content:`筋トレ種目「${name}」は次のどのカテゴリですか？1単語で答えてください: chest(胸), back(背中), shoulder(肩), leg(脚), arm(腕・二頭・三頭), core(腹筋・体幹), cardio(有酸素), default(その他)`}]
      })
    });
    const data = await res.json();
    const text = (data.content?.[0]?.text||'').toLowerCase().trim();
    const cat = ['chest','back','shoulder','leg','arm','core','cardio'].find(c=>text.includes(c)) || 'default';
    customExerciseCategories[name] = cat;
    // localStorageにも保存
    try{
      const saved = JSON.parse(localStorage.getItem('wt_categories')||'{}');
      saved[name] = cat;
      localStorage.setItem('wt_categories', JSON.stringify(saved));
    }catch(e){}
    return cat;
  }catch(e){
    return 'default';
  }
}

function getIconByCategory(cat){
  return CATEGORY_ICONS[cat] || CATEGORY_ICONS.default;
}
function getIconWithColor(name){
  const cat = getExerciseCategorySync(name);
  const color = CATEGORY_COLORS[cat] || CATEGORY_COLORS.default;
  const lightColor = color + '20';
  const icon = (EXERCISE_ICONS[name] || getIconByCategory(cat))
    .replace(/fill="#5e5ce6"/g, 'fill="'+color+'"')
    .replace(/fill="#a5a3f0"/g, 'fill="'+color+'88"')
    .replace(/stroke="#5e5ce6"/g, 'stroke="'+color+'"');
  return { icon, color, lightColor, cat };
}

function focusInput(){ document.getElementById('addInput').focus(); }

function hideSuggest(){
  document.getElementById('suggestSheet').classList.remove('on');
  document.getElementById('addInput').value = '';
}

function filterSuggest(){
  const val = document.getElementById('addInput').value.trim().toLowerCase();
  const master = getExerciseMaster(currentGym);
  const added = exercises.map(e=>e.name);
  let items = master.filter(n=>!added.includes(n));
  if(val) items = items.filter(n=>n.toLowerCase().includes(val));

  const other = Object.entries(EXERCISE_MASTER_BASE)
    .filter(([g])=>g!==currentGym)
    .flatMap(([g,list])=>list.map(n=>({name:n,gym:g})))
    .filter(({name})=>!added.includes(name) && (!val||name.toLowerCase().includes(val)))
    .filter(({name})=>!items.includes(name));

  const prevData = getPrevData();
  const sheet = document.getElementById('suggestSheet');
  if(!items.length && !other.length && !val){
    sheet.classList.remove('on'); return;
  }

  const renderItem = (name,gymId)=>{
    const prev = prevData[name]?.[gymId||currentGym];
    const prevStr = prev ? prev.map(s=>s.weight+'×'+s.reps).join(' · ') : '記録なし';
    const gymTag = gymId ? `<span style="font-size:9px;color:var(--text4);margin-left:4px">${GYMS.find(g=>g.id===gymId)?.label||''}</span>` : '';
    return `<div class="suggest-item" onclick="addExerciseFromSuggest('${name}')">
      <div class="suggest-ico" style="background:${ getIconWithColor(name).lightColor }">${ getIconWithColor(name).icon }</div>
      <div class="suggest-info">
        <div class="suggest-name">${name}${gymTag}</div>
        <div class="suggest-prev">${prevStr}</div>
      </div>
      <div class="suggest-add">＋</div>
    </div>`;
  };

  let html = '';
  if(items.length){
    const cg=GYMS.find(g=>g.id===currentGym);
    html += `<div class="suggest-header" style="display:flex;align-items:center;gap:5px"><span style="display:inline-flex;width:13px;height:13px">${cg?.icon||''}</span>${cg?.label||''}でよく使う種目</div>`;
    html += items.slice(0,6).map(n=>renderItem(n,null)).join('');
  }
  if(other.length && val){
    html += `<div class="suggest-divider"></div>`;
    html += other.slice(0,3).map(({name,gym})=>renderItem(name,gym)).join('');
  }
  html += `<div class="suggest-divider"></div>
    <div class="suggest-new" onclick="addCustomExercise()">
      <span style="display:inline-flex;width:1em;height:1em;flex-shrink:0;vertical-align:middle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h4l10.5-10.5a2.121 2.121 0 0 0-3-3L5 17v3z"/></svg></span></i><span>${val?'"'+val+'" を追加':'新しい種目を入力...'}</span>
    </div>`;

  sheet.innerHTML = html;
  sheet.classList.add('on');
}

function getPrevData(){
  const sessions = getDB().filter(s=>s.gym===currentGym);
  const result = {};
  for(let i=sessions.length-1;i>=0;i--){
    for(const ex of sessions[i].exercises){
      if(!result[ex.name]) result[ex.name] = {};
      if(!result[ex.name][currentGym]) result[ex.name][currentGym] = ex.sets;
    }
  }
  return result;
}

function getPrevSets(name){
  const sessions = getDB().filter(s=>s.gym===currentGym);
  for(let i=sessions.length-1;i>=0;i--){
    const ex = sessions[i].exercises.find(e=>e.name===name);
    if(ex && ex.sets.length) return ex.sets;
  }
  return null;
}

async function addExerciseByName(name){
  if(exercises.find(e=>e.name===name)){ showToast('すでに追加されています'); return; }
  const prev = getPrevSets(name);
  let sets;
  if(prev && prev.length){
    sets = prev.slice(0,3).map(s=>({weight:s.weight, reps:s.reps, done:false, preset:true}));
    while(sets.length < 3) sets.push({...sets[sets.length-1], done:false, preset:true});
  } else {
    sets = [{weight:20,reps:10,done:false,preset:false},{weight:20,reps:10,done:false,preset:false},{weight:20,reps:10,done:false,preset:false}];
  }
  exercises.push({name, sets});
  hideSuggest();
  renderRec();
  setTimeout(()=>{
    const el = document.querySelector('.ex-card:last-of-type');
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  }, 100);
  // プリセットにない種目はAIでカテゴリ判定（バックグラウンド）
  if(!EXERCISE_ICONS[name]){
    detectExerciseCategory(name).then(()=>{
      // アイコン更新（再描画不要、次回から反映）
      document.querySelectorAll('.ex-ico, .suggest-ico').forEach(el=>{
        const nameEl = el.closest('.ex-head, .suggest-item')?.querySelector('.ex-name, .suggest-name');
        if(nameEl?.textContent?.trim() === name){
          el.innerHTML = getIcon(name);
        }
      });
    });
  }
}

function syncWeightForward(ei, si, v){
  const card = document.querySelectorAll('.ex-card')[ei];
  exercises[ei].sets.forEach((s, idx) => {
    if(idx > si && !s.done){
      s.weight = v;
      if(card){
        const rows = card.querySelectorAll('.set-row');
        const row = rows[idx];
        if(row){
          const inp = row.querySelectorAll('.num-direct')[0];
          if(inp) inp.value = v;
        }
      }
    }
  });
}

function setVal(ei, si, field, raw){
  const step = field==='weight' ? 0.5 : 1;
  let v = parseFloat(raw);
  if(isNaN(v) || v <= 0) v = step;
  if(field==='weight') v = Math.max(0.5, Math.round(v*2)/2);
  else v = Math.max(1, Math.round(v));
  exercises[ei].sets[si][field] = v;
  exercises[ei].sets[si].preset = false;
  // 重量: 後続の未完了セットに同期
  if(field === 'weight'){
    syncWeightForward(ei, si, v);
  }
}

function changeVal(ei, si, field, delta){
  const step = field==='weight' ? 0.5 : 1;
  let v = exercises[ei].sets[si][field] + delta*step;
  if(field==='weight') v = Math.max(0.5, Math.round(v*2)/2);
  else v = Math.max(1, Math.round(v));
  exercises[ei].sets[si][field] = v;
  exercises[ei].sets[si].preset = false;
  // DOM更新
  const card = document.querySelectorAll('.ex-card')[ei];
  if(card){
    const rows = card.querySelectorAll('.set-row');
    const row = rows[si];
    if(row){
      const inputs = row.querySelectorAll('.num-direct');
      if(field==='weight' && inputs[0]) inputs[0].value = v;
      if(field==='reps' && inputs[1]) inputs[1].value = v;
    }
  }
  // 重量: 後続の未完了セットに同期
  if(field === 'weight'){
    syncWeightForward(ei, si, v);
  }
}


function removeSet(ei, si){
  if(exercises[ei].sets.length <= 1) return;
  exercises[ei].sets.splice(si, 1);
  renderRec();
}

function addSet(ei){
  const last = exercises[ei].sets[exercises[ei].sets.length-1];
  exercises[ei].sets.push({weight:last.weight, reps:last.reps, done:false, preset:false});
  renderRec();
}

function completeSet(ei, si){
  const set = exercises[ei].sets[si];
  set.done = !set.done;
  if(set.done){
    set.preset = false;
    startTimer(ei, si);
  }
  renderRec();
}

// --- TIMER ---
function startTimer(ei, si){
  if(timerRunning) clearInterval(timerInterval);
  timerExIdx = ei;
  timerSetIdx = si;
  timerSec = timerDur;
  timerRunning = true;
  document.getElementById('timerScreen').classList.add('on');
  updateTimerUI();
  timerInterval = setInterval(tickTimer, 1000);
}

function tickTimer(){
  timerSec--;
  if(timerSec <= 0){
    clearInterval(timerInterval);
    timerRunning = false;
    const rt = document.getElementById('ringTime');
    rt.textContent = 'GO!';
    rt.className = 'ring-time done';
    document.getElementById('ringSub').textContent = 'インターバル終了';
    try{ new Audio('data:audio/wav;base64,UklGRl9vT14=').play(); }catch(e){}
    setTimeout(()=>{ skipTimer(); }, 2000);
    return;
  }
  updateTimerUI();
}

function updateTimerUI(){
  const ex = exercises[timerExIdx];
  if(!ex) return;

  const allSets = ex.sets;
  const nextSetIdx = allSets.findIndex((s,i)=>i>timerSetIdx&&!s.done);
  const nextSet = nextSetIdx>=0 ? allSets[nextSetIdx] : null;

  document.getElementById('timerCtx').textContent = ex.name + ' · セット' + (timerSetIdx+1);
  document.getElementById('ringTime').textContent = fmtSec(timerSec);
  document.getElementById('ringTime').className = 'ring-time' + (timerSec<=10?' urgent':'');
  document.getElementById('ringSub').textContent = 'あと ' + timerSec + '秒';

  if(nextSet){
    document.getElementById('timerNextEx').textContent = ex.name;
    document.getElementById('timerNextSet').textContent = nextSet.weight+'kg × '+nextSet.reps+'回';
  } else {
    document.getElementById('timerNextEx').textContent = '次の種目へ';
    document.getElementById('timerNextSet').textContent = '—';
  }

  const prog = 552.9 * (1 - timerSec/timerDur);
  document.getElementById('ringProgress').style.strokeDashoffset = prog;

  const segsEl = document.getElementById('timerSegs');
  segsEl.innerHTML = allSets.map((s,i)=>{
    let cls = 'e';
    if(s.done && i < timerSetIdx) cls = 'f';
    else if(i === timerSetIdx) cls = 'p';
    else if(s.done) cls = 'f';
    return `<div class="seg ${cls}"></div>`;
  }).join('');

  document.getElementById('segLbl').textContent = 'セット '+(timerSetIdx+1)+'/'+allSets.length;
  document.getElementById('durLbl').textContent = timerDur+'秒';
}

function adjustDur(delta){
  timerDur = Math.max(15, Math.min(300, timerDur+delta));
  if(timerRunning) timerSec = Math.min(timerSec, timerDur);
  updateTimerUI();
}

function resetTimer(){
  timerSec = timerDur;
  if(!timerRunning){
    timerRunning = true;
    timerInterval = setInterval(tickTimer, 1000);
  }
  updateTimerUI();
}

function skipTimer(){
  clearInterval(timerInterval);
  timerRunning = false;
  document.getElementById('timerScreen').classList.remove('on');
}

【ユーザーの目標】

【直近1ヶ月の種目別データ】
${summary}

【停滞中の種目】
${stagnant.map(e=>e.name).join('、')||'なし'}

腕系の記録: ${missingArms?'なし（要追加）':'あり'}

【部位別セット数 vs 目標】
${bodyParts ? Object.entries(bodyParts).map(([k,b])=>b.label+': '+b.sets+'セット（目標'+b.target+'以上）'+(b.sets<b.target*0.5?'★不足':'')).join(', ') : ''}

        <div class="ai-text"><strong>${a.text}</strong><span class="ai-tag ${tagClass[a.type]||''}">${typeTag[a.type]||''}</span><br>${a.detail}</div>
      </div>`).join('')}</div>`;

    const now = new Date();
    aiUpdated.textContent = (now.getHours())+'時'+(now.getMinutes())+'分更新';
  } catch(e){
    aiContent.innerHTML = `<div class="ai-loading" style="color:var(--text4)"><span style="display:inline-flex;width:1em;height:1em;flex-shrink:0;vertical-align:middle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="8.5"/><line x1="12" y1="11" x2="12" y2="16"/></svg></span></i> データが不足しています。トレーニングを記録してください。</div>`;
  }
}

// --- HISTORY ---
function renderHist(){
  const all = getDB().slice().reverse();
  document.getElementById('histSub').textContent = all.length+'回のトレーニング';
  const el = document.getElementById('histList');
  if(!all.length){
    el.innerHTML = `<div class="empty"><span style="display:inline-flex;width:1em;height:1em;flex-shrink:0;vertical-align:middle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5"/></svg></span></i><p>まだ記録がありません。<br>トレーニングを完了すると<br>ここに表示されます。</p></div>`;
    return;
  }
  el.innerHTML = all.map((s,i)=>{
    const gym = GYMS.find(g=>g.id===s.gym);
    const tags = s.exercises.slice(0,3).map(e=>`<span class="hist-tag">${e.name}</span>`).join('');
    const more = s.exercises.length>3 ? `<span class="hist-more">+${s.exercises.length-3}</span>` : '';
    const detail = s.exercises.map(e=>{
      const sets = e.sets.map(st=>`<span class="hist-dset">${st.weight}×${st.reps}</span>`).join('');
      return `<div class="hist-dr"><div class="hist-dn">${e.name}</div><div class="hist-ds">${sets}</div></div>`;
    }).join('');
    return `
      <div class="hist-item" onclick="toggleDetail(this)">
        <div class="hist-meta">
          <div>
            <div class="hist-date">${fmtDate(s.date)}</div>
            <div class="hist-day">${dayLabel(s.date)}</div>
          </div>
          <div class="hist-gym" style="display:inline-flex;align-items:center;gap:5px">
            <span style="display:inline-flex;width:14px;height:14px;flex-shrink:0">${gym?.icon||''}</span>
            ${gym?.label||s.gym}
          </div>
        </div>
        <div class="hist-tags">${tags}${more}</div>
        <div class="hist-detail">${detail}
          <button class="hist-del" onclick="event.stopPropagation();confirmDelete('${s.id}','${s.date}','${gym?.label||s.gym}',${s.exercises.length})">このトレーニングを削除</button>
        </div>
      </div>`;
  }).join('');
}

function toggleDetail(el){
  el.querySelector('.hist-detail').classList.toggle('on');
}




// --- INSTALL BANNER ---
function checkInstallBanner(){
  // スタンドアロンモード（ホーム画面から起動）なら非表示
  const isStandalone = window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;
  if(isStandalone) return;
  // 一度閉じたら再表示しない
  if(localStorage.getItem('wt_banner_dismissed')) return;
  // iOSのSafariのみ表示
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari = /safari/i.test(navigator.userAgent) && !/chrome|crios|fxios/i.test(navigator.userAgent);
  if(isIOS && isSafari){
    setTimeout(()=>{
      document.getElementById('installBanner').style.display = 'flex';
    }, 2000);
  }
}

function dismissBanner(){
  document.getElementById('installBanner').style.display = 'none';
  localStorage.setItem('wt_banner_dismissed', '1');
}

// --- SETTINGS / GYM MANAGEMENT ---
const GYM_COLORS = ['#5e5ce6','#007aff','#34c759','#ff9500','#ff3b30','#af52de','#ff2d55','#00c7be'];
let selectedNewColor = GYM_COLORS[0];

function loadGyms(){
  try{
    const saved = JSON.parse(localStorage.getItem('wt_gyms')||'null');
    if(saved && saved.length) return saved;
  }catch(e){}
  return [
    {id:'jiyugaoka', label:'自由が丘', color:'#5e5ce6'},
    {id:'ontakesan',  label:'御嶽山',   color:'#007aff'},
    {id:'toritsu',   label:'都立大',   color:'#34c759'},
  ];
}

function saveGyms(){
  localStorage.setItem('wt_gyms', JSON.stringify(GYMS));
}

function gymIconSvg(color){
  return `<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="6" fill="${color}"/><path d="M5 8.5 L7.5 11 L11 5.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function renderGymSettings(){
  const list = document.getElementById('gymSettingsList');
  list.innerHTML = GYMS.map((g,i)=>`
    <div class="settings-item">
      <div class="settings-item-icon" style="background:${g.color}20">
        <span style="display:inline-flex;width:20px;height:20px">${gymIconSvg(g.color)}</span>
      </div>
      <div class="settings-item-body">
        <div class="settings-item-name">${g.label}</div>
        <div class="settings-item-sub" style="color:${g.color}">${g.color}</div>
      </div>
      ${GYMS.length > 1 ? `<button class="settings-item-del" onclick="confirmDeleteGym(${i})" title="削除">
        <span style="display:inline-flex;width:16px;height:16px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>
      </button>` : ''}
    </div>`).join('');

  // カラーピッカー
  const picker = document.getElementById('colorPicker');
  picker.innerHTML = GYM_COLORS.map(c=>`
    <div class="color-opt${c===selectedNewColor?' on':''}" style="background:${c}" onclick="selectColor('${c}')"></div>
  `).join('');
}

function selectColor(c){
  selectedNewColor = c;
  renderGymSettings();
}

function addGym(){
  const input = document.getElementById('newGymInput');
  const name = input.value.trim();
  if(!name){ showToast('拠点名を入力してください'); return; }
  if(GYMS.find(g=>g.label===name)){ showToast('すでに存在します'); return; }
  const id = 'gym_' + Date.now();
  GYMS.push({id, label:name, color:selectedNewColor});
  saveGyms();
  input.value = '';
  renderGymSettings();
  renderGymChips();
  showToast(name + ' を追加しました');
}

function confirmDeleteGym(idx){
  const gym = GYMS[idx];
  if(GYMS.length <= 1){ showToast('最低1拠点は必要です'); return; }
  if(!confirm(gym.label + ' を削除しますか？\n（記録データは残ります）')) return;
  if(currentGym === gym.id) currentGym = GYMS[idx===0?1:0].id;
  GYMS.splice(idx,1);
  saveGyms();
  renderGymSettings();
  renderGymChips();
  showToast('削除しました');
}

// --- DELETE ---
let deleteTargetId = null;

function confirmDelete(id, date, gym, exCount){
  deleteTargetId = id;
  const d = new Date(date);
  const days=['日','月','火','水','木','金','土'];
  document.getElementById('deleteDesc').textContent =
    (d.getMonth()+1)+'月'+d.getDate()+'日（'+days[d.getDay()]+'）'+gym+' · '+exCount+'種目';
  document.getElementById('deleteConfirm').classList.add('on');
}

function closeDelete(){
  document.getElementById('deleteConfirm').classList.remove('on');
  deleteTargetId = null;
}

function doDelete(){
  if(!deleteTargetId) return;
  const sessions = getDB().filter(s=>String(s.id)!==String(deleteTargetId));
  setDB(sessions);
  closeDelete();
  renderHist();
  showToast('削除しました');
}

// --- SCREEN NAV ---
function showScreen(id, btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('screen-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='dash') renderDash();
  if(id==='hist') renderHist();
  if(id==='settings') renderGymSettings();
}

// --- TOAST ---
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'), 2200);
}

init();
</script>
